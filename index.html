<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annutarium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13/dist/markdown-it.min.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-100 flex h-screen overflow-hidden">
    <div id="panesContainer" class="flex overflow-x-auto overflow-y-hidden scroll-snap-x mandatory p-4 space-x-2">
        <!-- Explorer Panel -->
        <div id="explorerPanel" class="flex-shrink-0 w-[50vw] min-w-[200px] bg-gray-800/50 backdrop-blur-sm rounded-lg shadow-md scroll-snap-start flex flex-col overflow-hidden transition-all duration-150">
            <!-- File Explorer Structure -->
            <div class="flex flex-col h-full">
                <header class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <h2 class="text-lg font-semibold">Explorer</h2>
                        <!-- Global Controls -->
                        <button id="expandCollapseAllBtn" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs rounded flex items-center space-x-1" title="Expandir/Colapsar todo">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                        <!-- TODO: Phase 3 - AI Reorganization Button -->
                        <button id="aiReorgBtn" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs rounded flex items-center space-x-1 opacity-50" title="Reorganización por temas (Fase 3)" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M6 12a6 6 0 100-12 6 6 0 000 12z" />
                            </svg>
                        </button>
                    </div>
                    <div class="flex space-x-2">
                        <button id="newFileBtn" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs rounded" title="New File">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                        </button>
                        <button id="newFolderBtn" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs rounded" title="New Folder">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20h10M12 4v16" />
                            </svg>
                        </button>
                    </div>
                </header>
                <div id="fileList" class="flex-1 overflow-y-auto p-2 space-y-1">
                    <!-- File items will be inserted here -->
                </div>
            </div>
        </div>
        <!-- Editor Panel -->
        <div id="editorPanel" class="flex-shrink-0 w-[50vw] min-w-[200px] bg-gray-800/50 backdrop-blur-sm rounded-lg shadow-md scroll-snap-start flex flex-col overflow-hidden transition-all duration-150">
            <!-- Editor Panel Structure -->
            <div class="flex flex-col h-full">
                <header class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                    <h2 class="text-lg font-semibold" id="fileTitle">Editor</h2>
                    <div class="flex space-x-2">
                        <button id="saveBtn" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs rounded" title="Save (Ctrl+S)">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                            </svg>
                        </button>
                        <button id="previewToggle" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs rounded" title="Toggle Preview">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </button>
                    </div>
                </header>
                <div class="flex-1 overflow-hidden">
                    <div id="editorContainer" class="flex-1 p-4">
                        <textarea id="editor" class="w-full h-full bg-gray-800/50 border-none text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-0" 
                                  placeholder="Start writing..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
                    </div>
                    <div id="previewContainer" class="hidden p-4 overflow-y-auto prose prose-sm text-gray-300">
                        <!-- Markdown preview will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Radial Menu -->
    <div id="radialMenu" class="fixed inset-0 pointer-none hidden items-center justify-center z-50">
        <div id="radialMenuContent" class="relative w-32 h-32 flex items-center justify-center transition-all duration-200" style="transform: translate(-50%, -50%);">
            <!-- Fixed menu items -->
            <div id="menuExplorer" class="absolute w-10 h-10 flex items-center justify-center bg-gray-800/50 backdrop-blur-sm rounded-full hover:bg-gray-700 transition-colors transform">
                <div class="flex flex-col items-center text-xs text-gray-300 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h10a2 2 0 012 2v10a2 2 0 01-2 2H3a2 2 0 01-2-2V9a2 2 0 012-2z"/>
                    </svg>
                    <span>Explorer</span>
                </div>
            </div>
            <div id="menuEditor" class="absolute w-10 h-10 flex items-center justify-center bg-gray-800/50 backdrop-blur-sm rounded-full hover:bg-gray-700 transition-colors transform">
                <div class="flex flex-col items-center text-xs text-gray-300 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                    </svg>
                    <span>Editor</span>
                </div>
            </div>
            <div id="menuNewFile" class="absolute w-10 h-10 flex items-center justify-center bg-gray-800/50 backdrop-blur-sm rounded-full hover:bg-gray-700 transition-colors transform">
                <div class="flex flex-col items-center text-xs text-gray-300 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v8m0 0l-4 4m4-4H4"/>
                    </svg>
                    <span>New File</span>
                </div>
            </div>
            <div id="menuNewFolder" class="absolute w-10 h-10 flex items-center justify-center bg-gray-800/50 backdrop-blur-sm rounded-full hover:bg-gray-700 transition-colors transform">
                <div class="flex flex-col items-center text-xs text-gray-300 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v8m0 0l-4-4m4 4H4"/>
                    </svg>
                    <span>New Folder</span>
                </div>
            </div>
            <div id="menuSettings" class="absolute w-10 h-10 flex items-center justify-center bg-gray-800/50 backdrop-blur-sm rounded-full hover:bg-gray-700 transition-colors transform">
                <div class="flex flex-col items-center text-xs text-gray-300 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 2 4 4 4h10c2 0 4-2 4-4V7m-6 9h.01M8 13h4M12 13h4M16 13h4M6 9h12M6 5h12a2 2 0 012 2v1a2 2 0 01-2 2H6a2 2 0 01-2-2V5a2 2 0 012-2h10a2 2 0 012 2v1a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/>
                    </svg>
                    <span>Settings</span>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js" defer></script>
    <script>
        // Initialize the app when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new AnnutariumApp();
        });
    </script>
</body>
</html>
